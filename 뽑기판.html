<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수상한 휴게소 질문 뽑기판 👻</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #4b2a75 100%);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; color: white;
        }

        .header { width: 95%; display: flex; justify-content: space-between; align-items: center; height: 8vh; margin-top: 1vh; z-index: 10; }
        h1 { margin: 0; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); color: #ffd700; }
        .controls button { font-family: 'Jua', sans-serif; font-size: 16px; padding: 10px 20px; margin-left: 10px; border: none; border-radius: 20px; cursor: pointer; background-color: rgba(255, 255, 255, 0.2); color: white; transition: background 0.3s; }
        .controls button:hover { background-color: rgba(255, 255, 255, 0.4); }

        /* 10x10 그리드 보드 (총 100칸) */
        .board-container {
            display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr);
            gap: 5px; width: 95vw; height: 88vh; margin-bottom: 2vh; max-width: 1800px; z-index: 1;
        }

        /* 카드 기본 스타일 */
        .card { background-color: transparent; perspective: 1000px; cursor: pointer; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        
        /* 💡 이미 확인한 카드 표시 */
        .card.viewed { opacity: 0.5; }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); box-sizing: border-box;
        }

        /* 카드 앞면 (힌트 추가) */
        .card-front {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-size: clamp(1.2rem, 2.5vw, 2.5rem); /* 칸이 줄어든 만큼 폰트 크기 살짝 확대 */
        }
        
        /* ★ 카드 앞면 하단 유형 힌트 배지 */
        .hint-badge {
            position: absolute; bottom: 3px; right: 3px; font-size: clamp(0.6rem, 1.2vw, 1rem);
            padding: 2px 4px; border-radius: 5px; color: white; font-weight: bold;
        }

        /* 💡 카드 중앙 확대 및 뒤집기 스타일 (CSS 전용) */
        .card.focused { z-index: 1000; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; cursor: default; }
        .card.focused .card-inner {
            transform: rotateY(180deg) scale(3.5); /* 3.5배 확대 및 뒤집기 */
            position: absolute; top: 38%; left: 45%; width: 10vw; height: 13vh; /* 중앙 배치 */
            cursor: pointer; /* 클릭하면 닫히게 */
        }

        /* 확대된 카드 뒷면 내용 (스크롤 적용) */
        .card-back {
            background-color: #fff; color: #333; transform: rotateY(180deg);
            flex-direction: column; border: 3px solid #ff9a9e;
            /* ★ 질문 전체 노출을 위한 스크롤 지원 */
            overflow-y: auto; overflow-x: hidden; justify-content: flex-start; padding: 15px;
        }
        
        /* 스크롤바 디자인 (귀엽게) */
        .card-back::-webkit-scrollbar { width: 6px; }
        .card-back::-webkit-scrollbar-thumb { background: #ff9a9e; border-radius: 3px; }

        .student-info { font-size: clamp(0.7rem, 0.9vw, 1.1rem); color: #888; margin-bottom: 5px; font-weight: bold; width: 100%; text-align: center; }
        .category-name { padding: 3px 8px; border-radius: 12px; color: white; font-size: 11px; margin-right: 5px; }
        .question-text {
            font-size: clamp(0.8rem, 1.1vw, 1.3rem); word-break: keep-all; line-height: 1.3; color: #4b1d52;
            text-align: left; margin-top: 10px; width: 100%;
        }
        .cheer-text { font-size: clamp(1rem, 1.2vw, 1.6rem); color: #ff5e62; align-self: center; margin-top: auto; margin-bottom: auto; }
        
        #loadingMsg { font-size: 24px; color: white; margin-top: 20vh; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚌 수상한 휴게소 질문 뽑기판 👻</h1>
        <div class="controls">
            <button onclick="fetchAndRenderBoard()">🔄 최신 질문 불러오기</button>
            <button id="fullscreenBtn" onclick="toggleFullScreen()">📺 전체 화면 모드</button>
        </div>
    </div>

    <div id="loadingMsg">구글 시트에서 아이들의 질문을 불러오고 있습니다... 🚀</div>
    <div class="board-container" id="board" style="display: none;"></div>

    <script>
        // 선생님의 구글 앱스 스크립트 웹 앱 URL입니다.
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgK4l7nKpAveZpsXz2I_v5QjBZsYcxYDBJAzoBnDOP5qWsQYJ-enIZTOl9XJQGCb8FBw/exec";

        const icons = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐣','🦉','🐢','🦕','🐳','🐬','🌺','🌻','🍄','🍀','🍎','🍓','🍦','🍩','🎈','🎁','💛','💚','💙','💜','👻','🌙','🚌'];
        const cheers = ['작가님 사랑해요! 💕', '다음 책도 기대할게요! ✨', '수상한 휴게소 최고! 👍', '오늘 만나서 반가워요! 🥰', '항상 건강하세요! 💪', '작가님 팬이에요! 🤩', '재미있는 이야기 감사합니다! 🎁', '작가님 최고 멋져요! 🌟'];

        let cardsData = [];

        // 1. 구글 시트에서 데이터 불러오기
        async function fetchAndRenderBoard() {
            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('board').style.display = 'none';
            document.getElementById('board').innerHTML = '';

            try {
                const response = await fetch(WEB_APP_URL);
                let fetchedQuestions = await response.json();
                
                cardsData = [...fetchedQuestions];

                // ★ 질문이 100개가 안 되면 남은 칸은 응원 문구로 채우기 (100칸 기준)
                const remainingSpots = 100 - cardsData.length;
                for (let i = 0; i < remainingSpots; i++) {
                    cardsData.push({ type: 'cheer', text: cheers[Math.floor(Math.random() * cheers.length)], category: 'cheer' });
                }

                // 데이터 무작위로 섞기 (피셔-예이츠 셔플)
                for (let i = cardsData.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cardsData[i], cardsData[j]] = [cardsData[j], cardsData[i]];
                }

                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('board').style.display = 'grid';
                renderBoard();

            } catch (error) {
                document.getElementById('loadingMsg').innerText = "데이터를 불러오는 중 오류가 발생했습니다. 새로고침 해주세요!";
                console.error(error);
            }
        }

        // 유형별 설정 (색상 및 이름)
        const categoryMap = {
            '1': { name: '책 내용', color: '#4caf50', emoji: '📚' },
            '2': { name: '창작과정', color: '#ff9800', emoji: '💡' },
            '3': { name: '작가님', color: '#2196f3', emoji: '🤔' },
            'cheer': { emoji: '🧡' },
            '0': { emoji: '❓' } // 분류 대기
        };

        // 2. 100칸 보드 그리기
        function renderBoard() {
            const board = document.getElementById('board');
            
            cardsData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;

                const randomIcon = icons[Math.floor(Math.random() * icons.length)];
                
                // ★ 카드 앞면 유형 힌트 배지 생성
                let frontHint = '';
                const cat = categoryMap[data.category];
                if (cat && data.category !== '0' && data.category !== 'cheer') {
                    frontHint = `<span class="hint-badge" style="background:${cat.color};">${cat.emoji}</span>`;
                } else if (data.category === 'cheer') {
                    frontHint = `<span class="hint-badge">${cat.emoji}</span>`; // 응원문구 힌트
                }

                let backContent = '';
                if (data.type === 'cheer') {
                    backContent = `<div class="cheer-text">${data.text}</div>`;
                } else {
                    // 뒷면 배지 및 학생 정보
                    const badge = (cat && data.category !== '0') 
                                  ? `<span class="category-name" style="background:${cat.color};">${cat.name}</span>` 
                                  : '';

                    backContent = `
                        <div class="student-info">${badge}${data.grade}학년 ${data.classNum}반 ${data.studentNum}번 ${data.name}</div>
                        <div class="question-text">${data.question}</div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">${randomIcon}${frontHint}</div>
                        <div class="card-back">${backContent}</div>
                    </div>
                `;

                // 💡 클릭 시 중앙 확대 이벤트 등록
                card.addEventListener('click', function(e) {
                    toggleCardFocus(this, data.type !== 'cheer');
                });

                board.appendChild(card);
            });
        }

        // 💡 카드 중앙 확대/축소 로직
        let focusedCard = null;

        function toggleCardFocus(cardElement, isQuestion) {
            // 이미 다른 카드가 확대되어 있다면 무시
            if (focusedCard && focusedCard !== cardElement) return;

            if (!cardElement.classList.contains('focused')) {
                // [확대]
                playPopSound();
                cardElement.classList.add('focused');
                focusedCard = cardElement;
                
                // 질문이면 폭죽 터뜨리기 (약간의 시간차)
                setTimeout(() => {
                    if(isQuestion) {
                        confetti({ particleCount: 70, spread: 80, origin: { y: 0.6 }, colors: ['#ff9966', '#ff5e62', '#ffd700', '#7597de'] });
                    }
                }, 400);

            } else {
                // [축소] - 확대된 카드를 다시 클릭하면 원래대로
                cardElement.classList.remove('focused');
                cardElement.classList.add('viewed'); // 확인한 카드로 표시
                focusedCard = null;
            }
        }

        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) { console.log("오디오 지원 안됨"); }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } 
            else { if (document.exitFullscreen) { document.exitFullscreen(); } }
        }

        window.onload = () => { fetchAndRenderBoard(); };
    </script>
</body>
</html>
